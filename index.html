<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover: 아이폰 노치/홈바 영역까지 화면을 씀 (safe-area 여백은 CSS가 처리) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>장바구니</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
  <!-- 앱 프레임: 내용은 대부분 script.js가 그려 넣음 -->
  <div id="app">
    <!-- 오프라인/에러/안내 배너 (헤더 위) -->
    <div id="offline-banner" class="banner" hidden>📡 오프라인 — 지금 하는 변경은 기기에 저장했다가 연결되면 자동으로 올려요</div>
    <div id="error-banner" class="banner" hidden></div>

    <!-- 헤더: 제목/개수/합계 + (장바구니)필터 버튼 / (기록)누적 지출 카드 -->
    <header id="app-header" class="app-header"></header>

    <!-- 퀵칩 (장바구니 탭에서만) -->
    <div id="quick-chips" class="chips sh" hidden></div>

    <!-- 빠른 추가 바 (장바구니 탭에서만): 이름만 치고 담기 -->
    <div id="quick-add" class="quick-add sh" hidden>
      <div class="qa-row">
        <input id="qa-input" class="qa-input" type="text" placeholder="빠르게 담기 (예: 우유)" autocomplete="off" enterkeyhint="done" />
        <button id="qa-btn" class="qa-btn" type="button">담기</button>
      </div>
      <div id="qa-sugs" class="sugs qa-sugs" hidden></div>
    </div>

    <!-- 목록 (분류/날짜별 카드) -->
    <div id="screen" class="screen sh"></div>

    <!-- + 추가 버튼 -->
    <button type="button" id="fab" class="fab" hidden aria-label="품목 추가">+</button>

    <!-- 선택 시 하단 액션바 (비우기 / 구매 완료) -->
    <div id="action-bar" class="action-bar" hidden></div>

    <!-- 하단 탭바 -->
    <nav id="tabbar" class="tabbar"></nav>

    <!-- 바텀시트 (추가/필터/수정 공용 자리) -->
    <div id="sheet-backdrop" class="sheet-backdrop" hidden></div>
    <div id="sheet-host"></div>

    <!-- 삭제 확인 -->
    <div id="confirm-backdrop" class="confirm-backdrop" hidden>
      <div class="confirm-box">
        <p id="confirm-msg" class="confirm-msg">삭제할까요?</p>
        <div class="confirm-actions">
          <button type="button" id="confirm-cancel" class="confirm-cancel">취소</button>
          <button type="button" id="confirm-ok" class="confirm-ok">삭제</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Supabase 클라이언트 (CDN). script.js보다 먼저 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- data.js: CATEGORIES/PRIORITIES/priorityInfo (script.js보다 먼저) -->
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
