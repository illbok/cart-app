<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니</title>
  <link rel="stylesheet" href="style.css" />
  <!-- PWA: 홈 화면에 설치할 때 쓰는 앱 정보(이름/아이콘/색) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
  <!-- layout: 왼쪽 사이드바 + 오른쪽 본문 (모바일에서는 위/아래로 쌓임) -->
  <div class="layout">

    <!-- 사이드바: 필터 + 드래그 놓는 곳. 내용은 JS가 채움.
         모바일에서는 아래에서 올라오는 시트(bottom sheet)로 바뀜 -->
    <aside class="sidebar" id="sidebar">
      <!-- 시트 헤더: 모바일에서만 보임 (닫기 버튼) -->
      <div class="sheet-header">
        <span class="sheet-title">필터</span>
        <button type="button" id="sheet-close" class="secondary small">완료</button>
      </div>
      <div class="side-section">
        <div class="side-title">분류</div>
        <div id="side-cats"></div>
      </div>
      <div class="side-section">
        <div class="side-title">중요도</div>
        <div id="side-pris"></div>
      </div>
      <p class="side-hint">PC에서는 품목을 끌어다 분류/중요도 위에 놓으면 이동됩니다</p>
    </aside>

    <main class="container">
      <h1>🛒 장바구니</h1>

      <!-- 화면 전환 탭: 장바구니 / 구매 기록 -->
      <div class="tabs">
        <button type="button" id="tab-cart" class="tab active">장바구니</button>
        <button type="button" id="tab-history" class="tab">구매 기록</button>
      </div>

      <!-- 모바일 전용: 필터 시트를 여는 버튼. 활성 필터가 있으면 배지로 표시 -->
      <button type="button" id="filter-toggle" class="filter-toggle">
        <span>필터</span>
        <span id="filter-badge" class="filter-badge" hidden></span>
      </button>

      <form id="add-form">
        <!-- 1행: 대분류 / 소분류 / 중요도 -->
        <div class="row row-selects">
          <select id="cat-select"></select>
          <select id="sub-select"></select>
          <select id="pri-select"></select>
        </div>
        <!-- 2행: 자동 입력된 값을 그대로 쓰거나 직접 수정 -->
        <div class="row row-inputs">
          <input type="text" id="item-name" placeholder="품목 (직접 입력 가능)" required autocomplete="off" />
          <input type="number" id="item-price" placeholder="가격" min="0" required />
          <input type="number" id="item-qty" placeholder="수량" min="1" value="1" required />
          <button type="submit">추가</button>
        </div>
      </form>

      <!-- 품목 입력 시 네이버 쇼핑 추천이 여기에 표시됨 -->
      <div id="suggestions" hidden></div>

      <p class="hint">※ 추천 가격은 네이버 쇼핑 최저가 기준이며 실제 구매가와 다를 수 있습니다. 품목을 누르면 수정할 수 있어요.</p>

      <!-- 저장/불러오기 실패 시 안내 배너 -->
      <div id="error-banner" hidden></div>

      <!-- 오프라인일 때 계속 떠 있는 안내 배너 -->
      <div id="offline-banner" hidden>📡 오프라인 — 지금 하는 추가/수정/삭제는 기기에 저장해 뒀다가, 연결되면 자동으로 서버에 올려요</div>

      <!-- 전체 선택: 체크박스로 고르기만 하고, 오른쪽 버튼을 눌러야 실제 처리됨.
           "전체 비우기"는 전체 선택이 켜져 있을 때만 나타남 (실수 방지) -->
      <div id="select-all-bar" hidden>
        <label><input type="checkbox" id="check-all" /> 전체 선택</label>
        <div class="bar-actions">
          <button type="button" id="clear-btn" class="danger small" hidden>전체 비우기</button>
          <button type="button" id="apply-selected" class="small" hidden>구매 완료</button>
        </div>
      </div>

      <!-- JS가 여기에 분류별로 목록을 그려 넣음 -->
      <div id="item-list"><p class="loading">불러오는 중…</p></div>

      <div class="summary">
        <span id="total-label">합계</span>
        <strong id="total">0원</strong>
      </div>

    </main>
  </div>

  <!-- 모바일 필터 시트 뒤 어두운 배경 (탭하면 시트 닫힘) -->
  <div id="sheet-backdrop" hidden></div>

  <!-- 모바일 전용: 화면 하단에 고정되는 액션 바 (합계 + 선택 처리 버튼) -->
  <div id="mobile-bar">
    <div class="mb-total">
      <span id="mb-total-label">합계</span>
      <strong id="mb-total-val">0원</strong>
    </div>
    <button type="button" id="mb-apply" class="mb-apply" hidden>구매 완료</button>
  </div>

  <!-- 삭제 확인 대화상자 (되돌리기 없는 작업이라 한 번 더 확인) -->
  <div id="confirm-backdrop" hidden>
    <div id="confirm-box">
      <p id="confirm-msg">삭제할까요?</p>
      <div class="confirm-actions">
        <button type="button" id="confirm-cancel" class="secondary">취소</button>
        <button type="button" id="confirm-ok" class="danger">삭제</button>
      </div>
    </div>
  </div>

  <!-- 상세/수정 모달: 평소엔 숨겨져 있다가 품목을 클릭하면 표시됨 -->
  <div id="modal-backdrop" hidden>
    <div id="modal">
      <h2>품목 상세</h2>

      <label>분류
        <select id="edit-cat"></select>
      </label>
      <label>중요도
        <select id="edit-pri"></select>
      </label>
      <label>품목명
        <div class="name-row">
          <input type="text" id="edit-name" />
          <!-- 긴 상품명을 규칙 기반으로 줄여 줌 -->
          <button type="button" id="edit-summarize" class="secondary small">요약</button>
        </div>
      </label>
      <div class="edit-row">
        <label>가격
          <input type="number" id="edit-price" min="0" />
        </label>
        <label>수량
          <input type="number" id="edit-qty" min="1" />
        </label>
      </div>

      <!-- 이 품목명으로 검색한 네이버 추천 5개 -->
      <div id="edit-sugs"><p class="sug-loading">추천 가격 불러오는 중…</p></div>

      <div class="modal-actions">
        <button id="edit-delete" class="danger">삭제</button>
        <button id="edit-cancel" class="secondary">취소</button>
        <button id="edit-save">저장</button>
      </div>
    </div>
  </div>

  <!-- Supabase 클라이언트 라이브러리 (CDN). script.js보다 먼저 불러야 함 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- data.js를 먼저 불러와야 script.js에서 CATEGORIES를 쓸 수 있음 (순서 중요) -->
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
